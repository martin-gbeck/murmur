name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Test
        run: ./test.sh

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Package
        run: ./packaging/build.sh
        # Set SIGN_IDENTITY (and notarization) as repo secrets when a
        # Developer ID certificate is available; ad-hoc signed until then.
      - name: Zip
        run: cd dist && zip -r Murmur.zip Murmur.app
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Murmur.zip
          generate_release_notes: true
